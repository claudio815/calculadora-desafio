<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Pro </title>
</head>
<style>
    .cartao{
    margin: 5px;
    padding 5px;
    color: #395AE3F0;
    border: 2px solid #6DD6E5;
    border-radius: 20px;
    font-family: 'Courier New',15px;
    text-align: center;
  }
    .calculadora { 
        background: #AA83EBC4; 
        padding: 20px; 
        border-radius: 20px;
    }
    
    #visor { 
        width: 100%; 
        height: 50px; 
        text-align: right; 
        font-size: 2rem; 
        background: #88F3EB7A; 
        color: #221F1F; 
        border: none; 
        margin-bottom: 10px; 
        border-radius: 20px;
        
    }
    .botoes { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        gap: 10px; }
    button { 
        padding: 20px; 
        font-size: 1.2rem; 
        border-radius: 10px; 
        border: none; 
    }
    .igual { 
        background: #00ff00; 
        grid-column: span 1; 
    }
    #visor-historico {
    width: 100%;
    margin-top: 20px;
    padding 15px;
    background:#88D0F3CF;
    border-radius: 10px;
    border: none;
    }

</style>

<body>
    <div class="cartao">
    <h1>Bem-vindo = >> Calculadora simples</h1>
    <p>Desafio do grupo</p>
    <p>FUTUROS DESENVOLVEDORES</p>
  </div>
    <div class="calculadora">
        <input type="text" id="visor" disabled>
        <div class="botoes">
            
            <button onclick="limpar()">C</button>
            <button onclick="add('/')">/</button>
            <button onclick="add('*')">x</button>
            <button onclick="add('+')">+</button>
            <button onclick="add('-')">-</button>
            <button onclick="add('9')">9</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('7')">7</button>
            <button onclick="add('6')">6</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('4')">4</button>
            <button onclick="add('3')">3</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('1')">1</button>
            <button onclick="add('0')">0</button>
            <button onclick="calcular()" class="igual">=</button>
        </div>
        <div>
            <input type="text" id="visor-historico" disabled>
        </div>
    </div>
    
    <script>
        const visor = document.getElementById('visor');
        // Pegar a referência do visor de histórico
        const visorHistorico = document.getElementById('visor-historico');
        function add(valor) {
            visor.value += valor;
            
        }
        //Função de limpar
        function limpar() {
            visor.value = "";
        }
        function calcular() {
    try {
        let contaCompleta = visor.value;
        
        // Fazer o cálculo
        let resultado = eval(visor.value);
        
        // histórico "CONTA = RESULTADO"
        visorHistorico.value = contaCompleta + " = " + resultado;
        
        // Mostrar o resultado no visor principal
        visor.value = resultado;
    } 
    catch {
        visor.value = "Erro";
    }
}
</script>
   
</body>
</html>
